services:

  postgres_db:
    container_name: memory_code_postgres
    image: postgres:18
    restart: always
    env_file:
      - ./apps/backend/.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend: